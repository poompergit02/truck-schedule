<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🚚 TSI - ระบบรอบรถ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --p9:#2D0A6E;--p7:#5B21B6;--p5:#7C3AED;--p4:#A78BFA;--p1:#EDE9FE;--p0:#F5F3FF;
  --gold:#F59E0B;--g4:#9CA3AF;--g7:#374151;--red:#DC2626;--green:#059669;
  --r:14px;--rs:8px;--sh:0 2px 12px rgba(91,33,182,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--p0);color:var(--g7);min-height:100vh}
nav{background:var(--p9);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.nav-logo{color:#fff;font-size:1.1rem;font-weight:700}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-branch{background:var(--p7);color:var(--p1);padding:4px 12px;border-radius:20px;font-size:.82rem;cursor:pointer;border:1px solid var(--p4)}
.btn-sm{background:transparent;border:1px solid var(--p4);color:var(--p1);padding:4px 10px;border-radius:20px;font-size:.8rem;cursor:pointer;font-family:'Sarabun',sans-serif}
.btn-sm:hover{background:var(--p7)}
.btn-sm.danger{border-color:#EF4444;color:#FCA5A5}
.btn-sm.danger:hover{background:#7f1d1d}
.tab-bar{background:#fff;border-bottom:2px solid var(--p1);display:flex;padding:0 20px;gap:2px;overflow-x:auto}
.tab{padding:12px 16px;font-size:.9rem;font-weight:600;color:var(--g4);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.2s}
.tab.active{color:var(--p5);border-bottom-color:var(--p5)}
.page{display:none;padding:20px;max-width:1200px;margin:0 auto}
.page.active{display:block}
.map-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:16px;position:relative}
#mapCanvas{width:100%;display:block;cursor:crosshair}
.form-card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;border:1px solid var(--p1)}
.form-card h2{font-size:1rem;font-weight:700;color:var(--p9);margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:.78rem;font-weight:600;color:var(--p7)}
.form-group select,.form-group input{padding:8px 10px;border:1.5px solid var(--p1);border-radius:var(--rs);font-size:.88rem;font-family:'Sarabun',sans-serif;color:var(--g7);background:var(--p0);outline:none}
.form-group select:focus,.form-group input:focus{border-color:var(--p4);background:#fff}
.arrow-lbl{display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:1.2rem;color:var(--p4);font-weight:700}
.btn-submit{width:100%;padding:12px;background:linear-gradient(135deg,var(--p5),var(--p7));color:#fff;border:none;border-radius:var(--rs);font-size:.95rem;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;transition:.2s;margin-top:4px}
.btn-submit:hover{opacity:.9;transform:translateY(-1px)}
.week-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.week-hdr h2{font-size:1rem;font-weight:700;color:var(--p9)}
.btn-refresh{padding:6px 14px;background:var(--p5);color:#fff;border:none;border-radius:var(--rs);font-size:.85rem;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:600}
.crusher-bar{background:linear-gradient(90deg,#4A148C,#6A1B9A);border-radius:var(--rs);padding:8px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.crusher-bar span{color:#E1BEE7;font-size:.82rem;flex:1}
.crusher-zone{min-width:70px;height:36px;background:#4A148C;border:2px dashed var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#FFD700;transition:.2s;cursor:crosshair}
.crusher-zone.hover{background:#880E4F;border-color:#EF4444;transform:scale(1.05)}
.day-row{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--p1)}
.day-lbl{padding:7px 14px;font-weight:700;font-size:.85rem;display:flex;align-items:center;gap:8px;color:#fff}
.day-lbl .cnt{margin-left:auto;background:rgba(255,255,255,.2);padding:1px 8px;border-radius:10px;font-size:.72rem}
.cards-wrap{padding:8px 10px;display:flex;flex-wrap:wrap;gap:8px;min-height:42px;align-items:flex-start}
.empty-msg{color:var(--g4);font-size:.82rem;padding:6px 4px;align-self:center}
.tc{background:var(--p0);border:1.5px solid var(--p1);border-radius:var(--rs);padding:7px 10px;min-width:155px;max-width:195px;position:relative;cursor:grab;transition:.2s;user-select:none}
.tc:hover{box-shadow:0 4px 14px rgba(124,58,237,.15);transform:translateY(-1px)}
.tc.cancelled{opacity:.4;filter:grayscale(1);cursor:default}
.tc-time{font-size:.88rem;font-weight:700;color:var(--p9)}
.tc-route{font-size:.78rem;color:var(--p7);font-weight:600;margin:2px 0}
.tc-eta{font-size:.74rem;color:var(--green);font-weight:600}
.tc-note{font-size:.72rem;color:var(--g4);margin-top:1px}
.tc-type{font-size:.7rem;background:var(--p1);color:var(--p7);padding:1px 6px;border-radius:8px;display:inline-block;margin-top:2px}
.tc-cancel{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.tc:hover .tc-cancel{opacity:1}
.hist-ctrl{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.hist-ctrl select{padding:7px 12px;border:1.5px solid var(--p1);border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.88rem;background:#fff;outline:none}
.btn-load{padding:7px 14px;background:var(--p5);color:#fff;border:none;border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.88rem;cursor:pointer;font-weight:600}
.btn-export{padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.88rem;cursor:pointer;font-weight:600}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;max-width:300px}
.toast{background:var(--p9);color:#fff;border-radius:var(--r);padding:11px 14px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:sIn .3s ease;border-left:4px solid var(--gold)}
.toast.err{border-left-color:#EF4444;background:#7f1d1d}
@keyframes sIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-bod{font-size:.82rem}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--r);padding:26px;width:340px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal h2{color:var(--p9);margin-bottom:6px;font-size:1.05rem}
.modal p{color:var(--g4);font-size:.83rem;margin-bottom:14px}
.branch-btn{width:100%;padding:10px;margin-bottom:6px;border-radius:var(--rs);border:2px solid var(--p1);background:var(--p0);color:var(--p9);font-family:'Sarabun',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;text-align:left}
.branch-btn:hover{background:var(--p5);color:#fff;border-color:var(--p5)}
.pw-input{width:100%;padding:10px;border:1.5px solid var(--p1);border-radius:var(--rs);font-size:.95rem;font-family:'Sarabun',sans-serif;margin-bottom:10px;outline:none}
.btn-confirm{width:100%;padding:10px;background:var(--red);color:#fff;border:none;border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer}
.update-lbl{font-size:.72rem;color:var(--g4)}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">🚚 TSI</div>
  <div class="nav-right">
    <button class="btn-sm danger" onclick="openResetModal()">🗑️ Reset</button>
    <button class="btn-sm" onclick="refreshData()">🔄</button>
    <div class="nav-branch" onclick="openBranchModal()" id="navBranch">🏭 เลือกสาขา</div>
  </div>
</nav>
<div class="tab-bar">
  <div class="tab active" onclick="showTab('live',this)">🗺️ แผนที่</div>
  <div class="tab" onclick="showTab('week',this)">📅 ตารางสัปดาห์</div>
  <div class="tab" onclick="showTab('history',this)">📂 ประวัติ</div>
</div>

<div class="page active" id="page-live">
  <div class="map-wrap">
    <canvas id="mapCanvas"></canvas>
  </div>
  <div class="form-card">
    <h2>➕ เพิ่มรอบรถ</h2>
    <div class="form-grid">
      <div class="form-group"><label>📅 วัน</label>
        <select id="fDay"><option value="0">จันทร์</option><option value="1">อังคาร</option><option value="2">พุธ</option><option value="3">พฤหัส</option><option value="4">ศุกร์</option><option value="5">เสาร์</option><option value="6">อาทิตย์</option></select>
      </div>
      <div class="form-group"><label>⏰ เวลาออก</label><input type="time" id="fTime" value="08:00"/></div>
      <div class="form-group"><label>🚗 ประเภทรถ</label>
        <select id="fType"><option value="truck">🚛 รถบรรทุก</option><option value="car">🚗 รถยนต์</option><option value="van">🚐 อื่นๆ</option></select>
      </div>
      <div class="form-group"><label>🏭 ต้นทาง</label>
        <select id="fOrigin"><option>HQ</option><option>CNS</option><option>Sriracha</option><option>Lampoon</option><option>Phitsanulok</option></select>
      </div>
      <div class="arrow-lbl">→</div>
      <div class="form-group"><label>📍 ปลายทาง</label>
        <select id="fDest"><option>HQ</option><option>CNS</option><option>Sriracha</option><option>Lampoon</option><option>Phitsanulok</option></select>
      </div>
      <div class="form-group"><label>🕐 คาดถึง (ETA)</label><input type="time" id="fEta"/></div>
    </div>
    <div class="form-group" style="margin-bottom:12px"><label>📝 หมายเหตุ</label>
      <input type="text" id="fNote" placeholder="เช่น สินค้าด่วน..." maxlength="80"/>
    </div>
    <button class="btn-submit" onclick="submitSchedule()">🚚 ส่งรอบรถ</button>
  </div>
</div>

<div class="page" id="page-week">
  <div class="week-hdr">
    <div><h2>📅 ตารางสัปดาห์นี้</h2><div class="update-lbl" id="lastUpdate"></div></div>
    <div style="display:flex;gap:8px">
      <button class="btn-export" onclick="exportCurrentWeek()">📊 Excel</button>
      <button class="btn-refresh" onclick="refreshData()">🔄 Refresh</button>
    </div>
  </div>
  <div class="crusher-bar">
    <span>⚙️ ลากการ์ดรถมาวางที่เครื่องบด → ยกเลิกรอบ</span>
    <div class="crusher-zone" id="crusherZone">💥 บดทิ้ง</div>
  </div>
  <div id="weekGrid"></div>
</div>

<div class="page" id="page-history">
  <h2 style="color:var(--p9);margin-bottom:14px;font-size:1rem;font-weight:700">📂 ประวัติย้อนหลัง</h2>
  <div class="hist-ctrl">
    <select id="histWeekSel"></select>
    <button class="btn-load" onclick="loadHistory()">🔍 ดูข้อมูล</button>
    <button class="btn-export" onclick="exportHistory()">📊 Export Excel</button>
  </div>
  <div id="histGrid"></div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<div class="modal-bg" id="branchModal">
  <div class="modal">
    <h2>🏭 เลือกสาขาของคุณ</h2>
    <p>ระบบจะแจ้งเตือนเมื่อมีรถมาถึงสาขาของคุณ</p>
    <button class="branch-btn" onclick="setBranch('HQ')">🏢 HQ — ปทุมธานี</button>
    <button class="branch-btn" onclick="setBranch('CNS')">🏭 CNS — ปทุมธานี</button>
    <button class="branch-btn" onclick="setBranch('Sriracha')">🏭 Sriracha — ชลบุรี</button>
    <button class="branch-btn" onclick="setBranch('Lampoon')">🏭 Lampoon — ลำพูน</button>
    <button class="branch-btn" onclick="setBranch('Phitsanulok')">🏭 Phitsanulok — พิษณุโลก</button>
  </div>
</div>

<div class="modal-bg" id="resetModal">
  <div class="modal">
    <h2>🗑️ Reset รอบรถทั้งหมด</h2>
    <p>ใส่รหัสผ่านเพื่อลบรอบรถทั้งหมดในสัปดาห์นี้</p>
    <input class="pw-input" type="password" id="resetPw" placeholder="รหัสผ่าน..." onkeydown="if(event.key==='Enter')confirmReset()"/>
    <button class="btn-confirm" onclick="confirmReset()">🗑️ ยืนยัน Reset</button>
    <button style="width:100%;padding:8px;margin-top:8px;background:none;border:1px solid #E5E7EB;border-radius:var(--rs);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:.9rem" onclick="closeResetModal()">ยกเลิก</button>
  </div>
</div>

<script>
const SUPABASE_URL='YOUR_SUPABASE_URL';
const SUPABASE_KEY='YOUR_SUPABASE_ANON_KEY';
const RESET_PASSWORD='itpoom';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

const DAY_NAMES=['จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์','อาทิตย์'];
const DAY_COLORS=['#F59E0B','#EC4899','#10B981','#F97316','#3B82F6','#8B5CF6','#EF4444'];

// ── แผนที่ไทย (좌표จริง lat/lng) ──
// bounding box
const LAT_MIN=5.5, LAT_MAX=20.5, LNG_MIN=97.5, LNG_MAX=105.8;

// outline ไทยแบบละเอียดขึ้น อ้างอิงรูปร่างจริง
const TH=[
  // ภาคใต้ฝั่งตะวันออก
  [103.5,5.65],[104.2,6.0],[104.8,6.3],[105.2,6.5],[105.65,6.2],
  [105.7,6.8],[105.0,7.2],[104.4,7.5],[103.8,7.8],[103.2,8.1],
  [102.8,8.0],[102.3,8.3],[101.8,8.5],[101.3,8.7],[100.9,9.0],
  [100.6,9.5],[100.2,9.8],[99.9,10.3],[99.6,10.8],[99.3,11.2],
  // ภาคใต้ฝั่งตะวันตก
  [98.8,11.8],[98.5,12.3],[98.2,12.8],[98.0,13.3],[97.8,13.8],
  [97.75,14.3],[97.8,14.8],[97.9,15.3],[98.1,15.8],[98.3,16.3],
  [98.2,16.8],[98.4,17.2],[98.6,17.7],[98.9,18.2],[99.1,18.6],
  // ภาคเหนือ
  [99.5,19.0],[99.9,19.5],[100.3,19.9],[100.6,20.1],[100.8,20.4],
  [101.1,20.5],[101.3,20.3],[101.5,20.0],[101.6,19.6],
  // ภาคเหนือตะวันออก
  [101.3,19.2],[101.5,18.8],[101.9,18.3],[102.4,18.0],
  [102.8,17.8],[103.0,18.1],[103.4,18.0],[103.9,17.5],
  [104.2,17.2],[104.6,16.7],[104.8,16.2],[105.0,15.7],
  [105.1,15.2],[104.9,14.7],[104.5,14.3],[104.0,13.9],
  [103.6,13.4],[103.1,12.8],[102.7,12.2],[102.4,11.5],
  [102.2,10.8],[102.0,10.0],[101.8,9.2],[101.9,8.5],
  [102.2,7.8],[102.5,7.0],[102.8,6.3],[103.0,5.9],[103.5,5.65]
];

// สาขา (lat/lng จริง)
const BRANCHES={
  HQ:          {label:'HQ',          lat:14.05, lng:100.73, color:'#C084FC'},
  CNS:         {label:'CNS',         lat:14.12, lng:100.42, color:'#60A5FA'},
  Sriracha:    {label:'Sriracha',    lat:13.13, lng:100.93, color:'#F87171'},
  Lampoon:     {label:'Lampoon',     lat:18.57, lng:99.01,  color:'#34D399'},
  Phitsanulok: {label:'Phitsanulok', lat:16.82, lng:100.27, color:'#FCD34D'},
};

let myBranch=localStorage.getItem('myBranch')||null;
let schedules=[];
let notified=new Set(JSON.parse(localStorage.getItem('notified')||'[]'));
let routes=[];   // active animated routes
let histData=[];
let canvas,ctx,W=0,H=0;
let animFrame=null;

function ll(lat,lng){
  // แปลง lat/lng → pixel x,y บน canvas
  const x=(lng-LNG_MIN)/(LNG_MAX-LNG_MIN)*W;
  const y=(1-(lat-LAT_MIN)/(LAT_MAX-LAT_MIN))*H;
  return [x,y];
}

function initMap(){
  canvas=document.getElementById('mapCanvas');
  resize();
  ctx=canvas.getContext('2d');
  if(animFrame) cancelAnimationFrame(animFrame);
  loop();
  window.addEventListener('resize',resize);
}

function resize(){
  W=canvas.parentElement.clientWidth;
  H=Math.round(W*0.72);
  canvas.width=W; canvas.height=H;
}

function loop(){
  animFrame=requestAnimationFrame(loop);
  drawAll();
}

function drawAll(){
  ctx.clearRect(0,0,W,H);

  // ── ทะเล ──
  ctx.fillStyle='#38BDF8';
  ctx.fillRect(0,0,W,H);

  // ── แผ่นดินไทย ──
  ctx.beginPath();
  TH.forEach(([lng,lat],i)=>{
    const [x,y]=ll(lat,lng);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  // gradient เขียว
  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#4ADE80');   // เหนือ - เขียวสด
  grd.addColorStop(0.5,'#22C55E'); // กลาง
  grd.addColorStop(1,'#16A34A');   // ใต้ - เขียวเข้ม
  ctx.fillStyle=grd;
  ctx.fill();
  ctx.strokeStyle='#15803D';
  ctx.lineWidth=Math.max(1.5,W/500);
  ctx.stroke();

  // ── แม่น้ำเจ้าพระยา ──
  ctx.beginPath();
  [[100.5,20.0],[100.4,19.0],[100.5,18.0],[100.2,17.0],
   [100.1,16.0],[100.2,15.0],[100.5,14.5],[100.6,14.0],[100.5,13.7]].forEach(([lng,lat],i)=>{
    const [x,y]=ll(lat,lng);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#7DD3FC';
  ctx.lineWidth=Math.max(1,W/600);
  ctx.globalAlpha=0.7;
  ctx.stroke();
  ctx.globalAlpha=1;

  // ── เส้นทางและรถ ──
  const now=Date.now();
  routes=routes.filter(r=>{
    // คำนวณ progress
    const elapsed=now-r.startTime;
    const dur=10000; // 10 วินาทีเคลื่อนที่ครั้งแรก
    r.progress=Math.min(1,elapsed/dur);

    // ถ้ามี ETA ให้อยู่จนถึง ETA
    if(r.eta){
      const [hh,mm]=r.eta.split(':').map(Number);
      const etaMs=new Date();etaMs.setHours(hh,mm,0,0);
      if(now>etaMs.getTime()) return false;
    } else {
      if(elapsed>60000) return false; // ไม่มี ETA หาย 60 วิ
    }

    const from=BRANCHES[r.from], to=BRANCHES[r.to];
    if(!from||!to) return false;
    const [fx,fy]=ll(from.lat,from.lng);
    const [tx,ty]=ll(to.lat,to.lng);

    // เส้นปะเคลื่อนไหว
    ctx.save();
    ctx.setLineDash([8,5]);
    ctx.lineDashOffset=-(now/40)%26;
    ctx.strokeStyle=r.color;
    ctx.lineWidth=Math.max(2,W/350);
    ctx.globalAlpha=0.85;
    ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);ctx.stroke();
    // shadow
    ctx.strokeStyle='rgba(0,0,0,.2)';
    ctx.lineWidth=Math.max(4,W/200);
    ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);ctx.stroke();
    ctx.restore();

    // รถ
    const px=fx+(tx-fx)*r.progress;
    const py=fy+(ty-fy)*r.progress;
    const angle=Math.atan2(ty-fy,tx-fx);
    drawVehicle(ctx,px,py,angle,r.color,r.vtype,W);

    return true;
  });

  // ── จุดสาขา ──
  const t=Date.now();
  Object.entries(BRANCHES).forEach(([k,b])=>{
    const [x,y]=ll(b.lat,b.lng);
    const pulse=Math.sin(t/600+x)*0.5+0.5;

    // วงกลม pulse
    ctx.save();
    ctx.globalAlpha=pulse*0.4;
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(x,y,16,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // จุดหลัก
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.stroke();

    // กล่องชื่อ
    const fs=Math.max(10,W/85);
    ctx.font=`bold ${fs}px Sarabun,sans-serif`;
    ctx.textAlign='center';
    const tw=ctx.measureText(b.label).width;
    const pad=6;
    const bx=x-tw/2-pad, by=y-fs-18, bw=tw+pad*2, bh=fs+6;
    ctx.fillStyle='rgba(0,0,0,.65)';
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,4);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.fillText(b.label,x,by+bh-4);
  });

  // ── Legend ──
  const lpad=10, lfs=Math.max(9,W/100);
  let ly=H-10-Object.keys(BRANCHES).length*(lfs+6);
  ctx.font=`${lfs}px Sarabun,sans-serif`;
  Object.entries(BRANCHES).forEach(([k,b])=>{
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.beginPath();ctx.roundRect(lpad,ly-lfs,90,lfs+4,3);ctx.fill();
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(lpad+8,ly-lfs/2+2,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.textAlign='left';
    ctx.fillText(b.label,lpad+16,ly);
    ly+=lfs+6;
  });

  // ── ป้าย ──
  ctx.textAlign='center';
  ctx.font=`italic ${Math.max(9,W/90)}px Sarabun,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.6)';
  const [gx,gy]=ll(9.0,101.5);
  ctx.fillText('อ่าวไทย',gx,gy);
  const [ax,ay]=ll(9.5,98.0);
  ctx.fillText('อันดามัน',ax,ay);
}

function drawVehicle(ctx,px,py,angle,color,type,W){
  ctx.save();
  ctx.translate(px,py);
  ctx.rotate(angle);
  const sc=Math.max(0.7,W/800);
  ctx.scale(sc,sc);
  ctx.shadowColor='rgba(0,0,0,.4)';
  ctx.shadowBlur=4;

  if(type==='truck'){
    // ตัวรถใหญ่
    ctx.fillStyle=color;ctx.strokeStyle='#fff';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.roundRect(-20,-7,30,14,3);ctx.fill();ctx.stroke();
    // หัวรถ/แค็บ
    ctx.beginPath();ctx.roundRect(8,-9,15,18,3);ctx.fill();ctx.stroke();
    // กระจก
    ctx.fillStyle='#BAE6FD';
    ctx.beginPath();ctx.roundRect(10,-7,10,7,2);ctx.fill();
    // ล้อ
    ctx.fillStyle='#1E293B';
    [[-13,8],[-4,8],[10,8],[18,8]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.ellipse(wx,wy,4,4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#64748B';ctx.beginPath();ctx.ellipse(wx,wy,1.5,1.5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1E293B';
    });
    // ควันท่อ
    ctx.globalAlpha=0.4;ctx.fillStyle='#E5E7EB';
    ctx.beginPath();ctx.ellipse(24,-9,4,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(28,-13,3,3,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  } else if(type==='car'){
    // รถยนต์เล็ก
    ctx.fillStyle=color;ctx.strokeStyle='#fff';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(-12,-4,22,9,3);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(-7,-8,14,6,3);ctx.fill();ctx.stroke();
    ctx.fillStyle='#BAE6FD';
    ctx.beginPath();ctx.roundRect(-5,-7,11,5,2);ctx.fill();
    ctx.fillStyle='#1E293B';
    [[-7,5],[8,5]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.ellipse(wx,wy,3,3,0,0,Math.PI*2);ctx.fill();
    });
  } else {
    // van
    ctx.fillStyle=color;ctx.strokeStyle='#fff';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(-16,-6,26,13,3);ctx.fill();ctx.stroke();
    ctx.fillStyle='#BAE6FD';
    [[-10,-4],[-4,-4],[2,-4]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.roundRect(wx,wy,5,6,1);ctx.fill();
    });
    ctx.fillStyle='#1E293B';
    [[-10,7],[8,7]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.ellipse(wx,wy,3.5,3.5,0,0,Math.PI*2);ctx.fill();
    });
  }
  ctx.restore();
}

function addRoute(from,to,eta,vtype){
  const colors=['#FF6B6B','#FFE66D','#4ECDC4','#FF8B94','#A8E6CF','#FFEAA7','#DDA0DD','#98FF98'];
  const color=colors[Math.floor(Math.random()*colors.length)];
  routes=routes.filter(r=>!(r.from===from&&r.to===to));
  routes.push({from,to,color,vtype:vtype||'van',startTime:Date.now(),progress:0,eta:eta||null});
}

function rebuildRoutes(){
  routes=[];
  const now=new Date(), todayIdx=now.getDay()===0?6:now.getDay()-1;
  schedules.filter(s=>!s.cancelled&&s.day_index===todayIdx).forEach(s=>{
    if(s.eta){
      const [h,m]=s.eta.split(':').map(Number);
      const etaDt=new Date();etaDt.setHours(h,m,0,0);
      if(etaDt>now) addRoute(s.origin,s.destination,s.eta,s.vehicle_type||'van');
    } else {
      // ไม่มี ETA ให้วิ่งแสดง 60 วิ
      addRoute(s.origin,s.destination,null,s.vehicle_type||'van');
    }
  });
}

// ── SUPABASE ──
async function refreshData(){
  const {data,error}=await sb.from('schedules').select('*').eq('week_key',getWeekKey()).order('day_index').order('time');
  if(error){showToast('❌ โหลดข้อมูลไม่สำเร็จ','err');return;}
  schedules=data||[];
  renderWeek(schedules);
  rebuildRoutes();
  document.getElementById('lastUpdate').textContent=`อัปเดต ${new Date().toLocaleTimeString('th-TH')}`;
  await loadHistoryWeeks();
  checkNotifications();
}

async function submitSchedule(){
  const day=parseInt(document.getElementById('fDay').value);
  const time=document.getElementById('fTime').value;
  const type=document.getElementById('fType').value;
  const origin=document.getElementById('fOrigin').value;
  const dest=document.getElementById('fDest').value;
  const eta=document.getElementById('fEta').value;
  const note=document.getElementById('fNote').value.trim();
  if(origin===dest){showToast('⚠️ ต้นทางและปลายทางต้องไม่เหมือนกัน','err');return;}
  const {error}=await sb.from('schedules').insert({
    week_key:getWeekKey(),day_index:day,day_name:DAY_NAMES[day],
    time,vehicle_type:type,origin,destination:dest,
    eta:eta||null,note:note||null,cancelled:false,
    created_at:new Date().toISOString()
  });
  if(error){showToast('❌ บันทึกไม่สำเร็จ: '+error.message,'err');return;}
  addRoute(origin,dest,eta||null,type);
  showToast(`✅ เพิ่มรอบรถ ${origin} → ${dest}`);
  document.getElementById('fNote').value='';
  await refreshData();
}

async function cancelSchedule(id){
  if(!confirm('ยืนยันยกเลิกรอบรถนี้?'))return;
  await sb.from('schedules').update({cancelled:true}).eq('id',id);
  showToast('❌ ยกเลิกรอบรถแล้ว');
  await refreshData();
}

function openResetModal(){document.getElementById('resetModal').classList.add('open');document.getElementById('resetPw').value='';setTimeout(()=>document.getElementById('resetPw').focus(),100);}
function closeResetModal(){document.getElementById('resetModal').classList.remove('open');}
async function confirmReset(){
  if(document.getElementById('resetPw').value!==RESET_PASSWORD){showToast('❌ รหัสผ่านไม่ถูกต้อง','err');return;}
  const {error}=await sb.from('schedules').delete().eq('week_key',getWeekKey());
  if(error){showToast('❌ Reset ไม่สำเร็จ','err');return;}
  closeResetModal();routes=[];
  showToast('🗑️ Reset สำเร็จ');
  await refreshData();
}

function typeLabel(t){return t==='truck'?'🚛 รถบรรทุก':t==='car'?'🚗 รถยนต์':'🚐 อื่นๆ';}

function renderWeek(data){
  const grid=document.getElementById('weekGrid');
  const byDay={};for(let i=0;i<7;i++) byDay[i]=[];
  data.filter(s=>!s.cancelled).forEach(s=>byDay[s.day_index].push(s));
  grid.innerHTML='';
  for(let d=0;d<7;d++){
    const items=byDay[d].sort((a,b)=>a.time.localeCompare(b.time));
    const row=document.createElement('div');row.className='day-row';
    row.innerHTML=`<div class="day-lbl" style="background:${DAY_COLORS[d]}">${DAY_NAMES[d]}<span class="cnt">${items.length} รอบ</span></div>
      <div class="cards-wrap" id="cw-${d}">${items.length===0?'<span class="empty-msg">— ไม่มีรอบรถ —</span>':''}</div>`;
    grid.appendChild(row);
    items.forEach(s=>{
      const c=document.createElement('div');c.className='tc';c.draggable=true;c.dataset.id=s.id;
      c.innerHTML=`<button class="tc-cancel" onclick="cancelSchedule('${s.id}')">✕</button>
        <div class="tc-time">${s.time}</div>
        <div class="tc-route">${s.origin} → ${s.destination}</div>
        ${s.eta?`<div class="tc-eta">🕐 คาดถึง ${s.eta}</div>`:''}
        ${s.vehicle_type?`<div class="tc-type">${typeLabel(s.vehicle_type)}</div>`:''}
        ${s.note?`<div class="tc-note">📝 ${s.note}</div>`:''}`;
      c.addEventListener('dragstart',e=>{e.dataTransfer.setData('sid',s.id);document.getElementById('crusherZone').classList.add('hover');});
      c.addEventListener('dragend',()=>document.getElementById('crusherZone').classList.remove('hover'));
      document.getElementById('cw-'+d).appendChild(c);
    });
  }
  const cz=document.getElementById('crusherZone');
  cz.ondragover=e=>e.preventDefault();
  cz.ondrop=e=>{e.preventDefault();const id=e.dataTransfer.getData('sid');if(id)cancelSchedule(id);cz.classList.remove('hover');};
}

async function loadHistoryWeeks(){
  const {data}=await sb.from('schedules').select('week_key').order('week_key',{ascending:false});
  if(!data)return;
  const weeks=[...new Set(data.map(r=>r.week_key))];
  const sel=document.getElementById('histWeekSel');
  sel.innerHTML=weeks.map(w=>`<option value="${w}">${fmtWeek(w)}</option>`).join('');
}

async function loadHistory(){
  const wk=document.getElementById('histWeekSel').value;if(!wk)return;
  const {data}=await sb.from('schedules').select('*').eq('week_key',wk).order('day_index').order('time');
  histData=data||[];
  const container=document.getElementById('histGrid');container.innerHTML='';
  const byDay={};for(let i=0;i<7;i++) byDay[i]=[];
  histData.forEach(s=>byDay[s.day_index].push(s));
  for(let d=0;d<7;d++){
    const items=byDay[d];if(!items.length)continue;
    const row=document.createElement('div');row.className='day-row';
    const html=items.map(s=>`<div class="tc ${s.cancelled?'cancelled':''}">
      <div class="tc-time">${s.time}${s.cancelled?' <span style="color:var(--red);font-size:.7rem">ยกเลิก</span>':''}</div>
      <div class="tc-route">${s.origin} → ${s.destination}</div>
      ${s.eta?`<div class="tc-eta">🕐 ${s.eta}</div>`:''}
      ${s.vehicle_type?`<div class="tc-type">${typeLabel(s.vehicle_type)}</div>`:''}
      ${s.note?`<div class="tc-note">📝 ${s.note}</div>`:''}
    </div>`).join('');
    row.innerHTML=`<div class="day-lbl" style="background:${DAY_COLORS[d]}">${DAY_NAMES[d]}<span class="cnt">${items.length}</span></div><div class="cards-wrap">${html}</div>`;
    container.appendChild(row);
  }
}

function exportToExcel(data,filename){
  if(!data||!data.length){showToast('⚠️ ไม่มีข้อมูล','err');return;}
  const rows=data.map(s=>({'วัน':s.day_name||'','เวลาออก':s.time||'','คาดถึง':s.eta||'','ประเภทรถ':typeLabel(s.vehicle_type||'van'),'ต้นทาง':s.origin||'','ปลายทาง':s.destination||'','หมายเหตุ':s.note||'','สถานะ':s.cancelled?'ยกเลิก':'ใช้งาน','วันที่':s.created_at?new Date(s.created_at).toLocaleString('th-TH'):''}));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'รอบรถ');
  XLSX.writeFile(wb,filename+'.xlsx');showToast('📊 Export สำเร็จ!');
}
function exportCurrentWeek(){exportToExcel(schedules,`TSI_รอบรถ_${getWeekKey()}`);}
function exportHistory(){
  if(!histData.length){showToast('⚠️ กด "ดูข้อมูล" ก่อน','err');return;}
  exportToExcel(histData,`TSI_ประวัติ_${document.getElementById('histWeekSel').value}`);
}

function checkNotifications(){
  if(!myBranch)return;
  const now=new Date(),todayIdx=now.getDay()===0?6:now.getDay()-1;
  schedules.filter(s=>!s.cancelled&&s.destination===myBranch&&s.day_index===todayIdx&&s.eta).forEach(s=>{
    if(notified.has(s.id))return;
    const [h,m]=s.eta.split(':').map(Number);
    const eta=new Date();eta.setHours(h,m,0,0);
    const mins=(eta-now)/60000;
    if(mins>=13&&mins<=17){
      notified.add(s.id);localStorage.setItem('notified',JSON.stringify([...notified]));
      showToast(`🔔 รถกำลังจะถึง ${myBranch}! ${s.origin}→${s.destination} คาดถึง ${s.eta}`);
    }
  });
}

function subscribeRealtime(){
  sb.channel('sc').on('postgres_changes',{event:'*',schema:'public',table:'schedules'},()=>refreshData()).subscribe();
}

function openBranchModal(){document.getElementById('branchModal').classList.add('open');}
function setBranch(b){myBranch=b;localStorage.setItem('myBranch',b);document.getElementById('navBranch').textContent=`🏭 ${b}`;document.getElementById('branchModal').classList.remove('open');showToast(`✅ ตั้งสาขา ${b}`);}

function showToast(msg,type='ok'){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className='toast'+(type==='err'?' err':'');
  t.innerHTML=`<div class="toast-bod">${msg}</div>`;wrap.appendChild(t);setTimeout(()=>t.remove(),5000);
}
function showTab(t,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(tb=>tb.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');el.classList.add('active');
}
function getWeekKey(){
  const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));return d.toISOString().slice(0,10);
}
function fmtWeek(wk){const d=new Date(wk);return `จันทร์ ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;}

window.onload=async()=>{
  initMap();
  if(!myBranch) openBranchModal();
  else document.getElementById('navBranch').textContent=`🏭 ${myBranch}`;
  document.getElementById('fDay').value=new Date().getDay()===0?6:new Date().getDay()-1;
  document.getElementById('fDest').value='CNS';
  await refreshData();
  subscribeRealtime();
  setInterval(checkNotifications,30000);
  setInterval(refreshData,30000);
};
</script>
