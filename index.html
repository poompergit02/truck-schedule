<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🚚 TSI - ระบบรอบรถ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --p9:#2D0A6E;--p7:#5B21B6;--p5:#7C3AED;--p4:#A78BFA;--p1:#EDE9FE;--p0:#F5F3FF;
  --gold:#F59E0B;--white:#fff;--g2:#E5E7EB;--g4:#9CA3AF;--g7:#374151;
  --red:#DC2626;--green:#059669;
  --r:14px;--rs:8px;--sh:0 2px 12px rgba(91,33,182,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--p0);color:var(--g7);min-height:100vh}
nav{background:var(--p9);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.nav-logo{color:#fff;font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-branch{background:var(--p7);color:var(--p1);padding:4px 12px;border-radius:20px;font-size:.82rem;cursor:pointer;border:1px solid var(--p4)}
.btn-sm{background:transparent;border:1px solid var(--p4);color:var(--p1);padding:4px 12px;border-radius:20px;font-size:.82rem;cursor:pointer;font-family:'Sarabun',sans-serif}
.btn-sm:hover{background:var(--p7)}
.tab-bar{background:#fff;border-bottom:2px solid var(--p1);display:flex;padding:0 20px;gap:2px;overflow-x:auto}
.tab{padding:12px 16px;font-size:.9rem;font-weight:600;color:var(--g4);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.2s}
.tab.active{color:var(--p5);border-bottom-color:var(--p5)}
.page{display:none;padding:20px;max-width:1200px;margin:0 auto}
.page.active{display:block}

/* MAP */
.map-wrap{background:linear-gradient(135deg,#0a1628 0%,#1a0050 100%);border-radius:var(--r);overflow:hidden;margin-bottom:16px;position:relative}
#mapCanvas{width:100%;display:block}
.map-legend{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);border-radius:8px;padding:8px 12px;display:flex;flex-direction:column;gap:4px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.75rem;color:#ddd}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* FORM */
.form-card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;border:1px solid var(--p1)}
.form-card h2{font-size:1rem;font-weight:700;color:var(--p9);margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:.78rem;font-weight:600;color:var(--p7)}
.form-group select,.form-group input{padding:8px 10px;border:1.5px solid var(--p1);border-radius:var(--rs);font-size:.9rem;font-family:'Sarabun',sans-serif;color:var(--g7);background:var(--p0);transition:.2s;outline:none}
.form-group select:focus,.form-group input:focus{border-color:var(--p4);background:#fff}
.arrow-lbl{display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:1.3rem;color:var(--p4);font-weight:700}
.btn-submit{width:100%;padding:12px;background:linear-gradient(135deg,var(--p5),var(--p7));color:#fff;border:none;border-radius:var(--rs);font-size:.95rem;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;transition:.2s;margin-top:4px}
.btn-submit:hover{opacity:.9;transform:translateY(-1px)}

/* WEEK */
.week-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.week-hdr h2{font-size:1rem;font-weight:700;color:var(--p9)}
.btn-refresh{padding:6px 14px;background:var(--p5);color:#fff;border:none;border-radius:var(--rs);font-size:.85rem;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:600}

/* CRUSHER - fixed top */
.crusher-bar{background:linear-gradient(90deg,#4A148C,#6A1B9A);border-radius:var(--rs);padding:8px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.crusher-bar span{color:#E1BEE7;font-size:.82rem;flex:1}
.crusher-zone{min-width:70px;height:38px;background:#4A148C;border:2px dashed var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:.2s;cursor:crosshair}
.crusher-zone.hover{background:#880E4F;border-color:#EF4444;transform:scale(1.05)}

/* DAY ROWS - compact */
.day-row{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--p1)}
.day-lbl{padding:8px 14px;font-weight:700;font-size:.85rem;display:flex;align-items:center;gap:8px;color:#fff}
.day-lbl .cnt{margin-left:auto;background:rgba(255,255,255,.2);padding:1px 8px;border-radius:10px;font-size:.75rem}
.cards-wrap{padding:8px 10px;display:flex;flex-wrap:wrap;gap:8px;min-height:44px;align-items:flex-start}
.empty-msg{color:var(--g4);font-size:.82rem;padding:6px 4px;align-self:center}

/* TRUCK CARD - compact */
.tc{background:var(--p0);border:1.5px solid var(--p1);border-radius:var(--rs);padding:7px 10px;min-width:160px;max-width:200px;position:relative;cursor:grab;transition:.2s;user-select:none}
.tc:hover{box-shadow:0 4px 14px rgba(124,58,237,.15);transform:translateY(-1px)}
.tc.cancelled{opacity:.4;filter:grayscale(1);cursor:default}
.tc-time{font-size:.9rem;font-weight:700;color:var(--p9);display:flex;align-items:center;gap:5px}
.tc-route{font-size:.78rem;color:var(--p7);font-weight:600;margin:2px 0}
.tc-eta{font-size:.75rem;color:var(--green);font-weight:600}
.tc-note{font-size:.72rem;color:var(--g4);margin-top:1px}
.tc-type{font-size:.7rem;background:var(--p1);color:var(--p7);padding:1px 6px;border-radius:8px;display:inline-block;margin-top:2px}
.tc-cancel{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.tc:hover .tc-cancel{opacity:1}

/* HISTORY */
.hist-ctrl{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.hist-ctrl select{padding:8px 12px;border:1.5px solid var(--p1);border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.9rem;background:#fff;outline:none}
.btn-load{padding:8px 16px;background:var(--p5);color:#fff;border:none;border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.9rem;cursor:pointer;font-weight:600}
.btn-export{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.9rem;cursor:pointer;font-weight:600}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;max-width:320px}
.toast{background:var(--p9);color:#fff;border-radius:var(--r);padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:sIn .3s ease;border-left:4px solid var(--gold)}
.toast.err{border-left-color:#EF4444;background:#7f1d1d}
@keyframes sIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-ttl{font-weight:700;font-size:.88rem;margin-bottom:3px}
.toast-bod{font-size:.8rem;opacity:.9}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--r);padding:28px;width:360px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{color:var(--p9);margin-bottom:6px;font-size:1.1rem}
.modal p{color:var(--g4);font-size:.85rem;margin-bottom:16px}
.branch-btn{width:100%;padding:11px;margin-bottom:7px;border-radius:var(--rs);border:2px solid var(--p1);background:var(--p0);color:var(--p9);font-family:'Sarabun',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s;text-align:left}
.branch-btn:hover{background:var(--p5);color:#fff;border-color:var(--p5)}

.update-lbl{font-size:.75rem;color:var(--g4)}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🚚 TSI</div>
  <div class="nav-right">
    <button class="btn-sm" onclick="refreshData()">🔄</button>

<div class="tab-bar">

<!-- PAGE: MAP/LIVE -->
<div class="page active" id="page-live">

    <canvas id="mapCanvas"></canvas>

  <div class="form-card">

      <div class="form-group">

<!-- PAGE: HISTORY -->
<div class="page" id="page-history">

    <select id="histWeekSel"></select>

<div class="toast-wrap" id="toastWrap"></div>

    <h2>🏭 เลือกสาขาของคุณ</h2>
    <p>ระบบจะแจ้งเตือนเมื่อมีรถมาถึงสาขาของคุณ</p>
    <button class="branch-btn" onclick="setBranch('HQ')">🏢 HQ — ปทุมธานี</button>
    <button class="branch-btn" onclick="setBranch('CNS')">🏭 CNS — ปทุมธานี</button>
    <button class="branch-btn" onclick="setBranch('Sriracha')">🏭 Sriracha — ชลบุรี</button>
    <button class="branch-btn" onclick="setBranch('Lampoon')">🏭 Lampoon — ลำพูน</button>
    <button class="branch-btn" onclick="setBranch('Phitsanulok')">🏭 Phitsanulok — พิษณุโลก</button>

</div>

<script>
const SUPABASE_URL = 'https://gmilmskiwrhrgqfjlakt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_WyQKdaKZQbd1vx2cavFwJw_dK-TL6Ur';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

const DAY_NAMES=['จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์','อาทิตย์'];
const DAY_COLORS=['#F59E0B','#EC4899','#10B981','#F97316','#3B82F6','#8B5CF6','#EF4444'];

// branch coords on map (normalized 0-1 relative to Thailand SVG bounding box)
// Thailand approx lat 5.5-20.5, lng 97.5-105.7
const BRANCHES={
  HQ:        {label:'HQ',       lat:14.02, lng:100.64, color:'#7C3AED'},
  CNS:       {label:'CNS',      lat:14.02, lng:100.55, color:'#3B82F6'},
  Sriracha:  {label:'Sriracha', lat:13.12, lng:100.92, color:'#EF4444'},
  Lampoon:   {label:'Lampoon',  lat:18.57, lng:99.01,  color:'#10B981'},
  Phitsanulok:{label:'Phitsanulok',lat:16.82,lng:100.27,color:'#F59E0B'},
};

// Thailand simplified outline (lng,lat pairs)
const TH_OUTLINE=[
  [102.1,5.6],[103.0,6.0],[103.5,6.2],[104.5,6.4],[105.6,6.0],[105.7,7.0],[104.8,7.5],
  [103.5,8.2],[102.8,8.5],[102.2,8.0],[101.5,8.5],[100.8,8.3],[100.0,8.7],[99.5,9.5],
  [99.2,10.5],[98.8,11.5],[98.3,12.5],[98.0,13.5],[97.8,14.5],[97.5,15.5],[97.7,16.5],
  [98.0,17.5],[98.2,18.5],[99.0,19.5],[100.0,20.0],[100.5,20.5],[101.0,20.2],[101.5,19.5],
  [101.2,18.5],[101.5,17.8],[102.5,17.5],[103.5,18.0],[104.0,17.5],[104.5,16.5],[105.0,15.5],
  [105.2,14.5],[104.5,13.5],[103.5,12.5],[103.0,11.0],[102.5,10.0],[102.1,9.0],[102.0,7.5],[102.1,5.6]
];

let myBranch=localStorage.getItem('myBranch')||null;
let schedules=[];
let notified=new Set(JSON.parse(localStorage.getItem('notified')||'[]'));
let activeRoutes=[];// {from,to,color,progress,id}
let histData=[];

// ── CANVAS MAP ──
let canvas,ctx;
const LAT_MIN=5.5,LAT_MAX=20.5,LNG_MIN=97.5,LNG_MAX=105.7;

function latLngToXY(lat,lng,w,h){
  const x=(lng-LNG_MIN)/(LNG_MAX-LNG_MIN)*w;
  const y=(1-(lat-LAT_MIN)/(LAT_MAX-LAT_MIN))*h;
  return [x,y];
}

function initMap(){
  canvas=document.getElementById('mapCanvas');
  const W=canvas.parentElement.clientWidth;
  const H=Math.round(W*0.65);
  canvas.width=W; canvas.height=H;
  ctx=canvas.getContext('2d');
  requestAnimationFrame(mapLoop);
}

function mapLoop(){
  requestAnimationFrame(mapLoop);
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // background
  ctx.fillStyle='#0a1628'; ctx.fillRect(0,0,W,H);

  // Thailand outline
  ctx.beginPath();
  TH_OUTLINE.forEach(([lng,lat],i)=>{
    const [x,y]=latLngToXY(lat,lng,W,H);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle='#1e3a5f';
  ctx.fill();
  ctx.strokeStyle='#3B82F6';
  ctx.lineWidth=1.2;
  ctx.stroke();

  // animate routes
  const now=Date.now();
  activeRoutes=activeRoutes.filter(r=>{
    r.progress=Math.min(1,(now-r.startTime)/r.duration);
    const from=BRANCHES[r.from],to=BRANCHES[r.to];
    if(!from||!to) return false;
    const [fx,fy]=latLngToXY(from.lat,from.lng,W,H);
    const [tx,ty]=latLngToXY(to.lat,to.lng,W,H);

    // dashed route line
    ctx.save();
    ctx.strokeStyle=r.color;
    ctx.lineWidth=2;
    ctx.setLineDash([6,4]);
    ctx.lineDashOffset=-now/60;
    ctx.globalAlpha=0.7;
    ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);ctx.stroke();
    ctx.restore();

    // truck position along route
    const px=fx+(tx-fx)*r.progress;
    const py=fy+(ty-fy)*r.progress;
    const angle=Math.atan2(ty-fy,tx-fx);

    // draw mini truck
    ctx.save();
    ctx.translate(px,py);
    ctx.rotate(angle);
    ctx.fillStyle=r.color;
    ctx.strokeStyle='#fff';
    ctx.lineWidth=0.8;
    // body
    ctx.beginPath();ctx.roundRect(-10,-5,18,10,2);ctx.fill();ctx.stroke();
    // cab
    ctx.beginPath();ctx.roundRect(6,-6,7,12,2);ctx.fill();ctx.stroke();
    // wheels
    ctx.fillStyle='#222';
    [[-6,5],[4,5],[9,5]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.ellipse(wx,wy,2.5,2.5,0,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();

    return r.progress<1;
  });

  // branch markers
  Object.entries(BRANCHES).forEach(([key,b])=>{
    const [x,y]=latLngToXY(b.lat,b.lng,W,H);
    // pulse ring
    const pulse=(Math.sin(now/600+x)*0.3+0.7);
    ctx.save();
    ctx.globalAlpha=pulse*0.4;
    ctx.strokeStyle=b.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.stroke();
    ctx.restore();
    // dot
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.stroke();
    // label
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.max(10,W/80)}px Sarabun,sans-serif`;
    ctx.textAlign='center';
    ctx.fillText(b.label,x,y-10);
  });
}

function addRoute(from,to){
  const colors=['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F'];
  const color=colors[Math.floor(Math.random()*colors.length)];
  activeRoutes.push({from,to,color,progress:0,startTime:Date.now(),duration:6000+Math.random()*4000});
}

function updateLegend(){
  const el=document.getElementById('mapLegend');
  el.innerHTML=Object.entries(BRANCHES).map(([k,b])=>
    `<div class="legend-item"><div class="legend-dot" style="background:${b.color}"></div>${b.label}</div>`
  ).join('');
}

// ── SUPABASE ──
async function refreshData(){
  const wk=getWeekKey();
  const {data,error}=await sb.from('schedules').select('*').eq('week_key',wk).order('day_index').order('time');
  if(error){showToast('❌ โหลดข้อมูลไม่สำเร็จ','err');return;}
  schedules=data||[];
  renderWeek(schedules);
  document.getElementById('lastUpdate').textContent=`อัปเดต ${new Date().toLocaleTimeString('th-TH')}`;
  await loadHistoryWeeks();
  checkNotifications();
}

async function submitSchedule(){
  const day=parseInt(document.getElementById('fDay').value);
  const time=document.getElementById('fTime').value;
  const type=document.getElementById('fType').value;
  const origin=document.getElementById('fOrigin').value;
  const dest=document.getElementById('fDest').value;
  const eta=document.getElementById('fEta').value;
  const note=document.getElementById('fNote').value.trim();
  if(origin===dest){showToast('⚠️ ต้นทางและปลายทางต้องไม่เหมือนกัน','err');return;}
  const {error}=await sb.from('schedules').insert({
    week_key:getWeekKey(),day_index:day,day_name:DAY_NAMES[day],
    time,vehicle_type:type,origin,destination:dest,
    eta:eta||null,note:note||null,cancelled:false,
    created_at:new Date().toISOString()
  });
  if(error){showToast('❌ บันทึกไม่สำเร็จ','err');return;}
  addRoute(origin,dest);
  showToast(`✅ เพิ่มรอบรถ ${origin} → ${dest} สำเร็จ`);
  document.getElementById('fNote').value='';
  await refreshData();
}

async function cancelSchedule(id){
  if(!confirm('ยืนยันยกเลิกรอบรถนี้?'))return;
  await sb.from('schedules').update({cancelled:true}).eq('id',id);
  showToast('❌ ยกเลิกรอบรถแล้ว');
  await refreshData();
}

// ── RENDER WEEK ──
function renderWeek(data){
  const grid=document.getElementById('weekGrid');
  const byDay={};
  for(let i=0;i<7;i++) byDay[i]=[];
  data.filter(s=>!s.cancelled).forEach(s=>byDay[s.day_index].push(s));
  grid.innerHTML='';
  for(let d=0;d<7;d++){
    const items=byDay[d].sort((a,b)=>a.time.localeCompare(b.time));
    const row=document.createElement('div');
    row.className='day-row';
    row.innerHTML=`
      <div class="day-lbl" style="background:${DAY_COLORS[d]}">
        ${DAY_NAMES[d]}<span class="cnt">${items.length} รอบ</span>
      </div>
      <div class="cards-wrap" id="cw-${d}">
        ${items.length===0?'<span class="empty-msg">— ไม่มีรอบรถ —</span>':''}
      </div>`;
    grid.appendChild(row);
    items.forEach(s=>{
      const c=document.createElement('div');
      c.className='tc'; c.draggable=true; c.dataset.id=s.id;
      const typeIcon=s.vehicle_type==='รถบรรทุก'?'🚛':s.vehicle_type==='รถยนต์'?'🚗':'🚐';
      c.innerHTML=`
        <button class="tc-cancel" onclick="cancelSchedule('${s.id}')">✕</button>
        <div class="tc-time">${typeIcon} ${s.time}</div>
        <div class="tc-route">${s.origin} → ${s.destination}</div>
        ${s.eta?`<div class="tc-eta">🕐 คาดถึง ${s.eta}</div>`:''}
        ${s.vehicle_type?`<div class="tc-type">${s.vehicle_type}</div>`:''}
        ${s.note?`<div class="tc-note">📝 ${s.note}</div>`:''}`;
      c.addEventListener('dragstart',e=>{
        e.dataTransfer.setData('sid',s.id);
        document.getElementById('crusherZone').classList.add('hover');
      });
      c.addEventListener('dragend',()=>{
        document.getElementById('crusherZone').classList.remove('hover');
      });
      document.getElementById('cw-'+d).appendChild(c);
    });
  }
  // crusher drop
  const cz=document.getElementById('crusherZone');
  cz.ondragover=e=>e.preventDefault();
  cz.ondrop=e=>{
    e.preventDefault();
    const id=e.dataTransfer.getData('sid');
    if(id) cancelSchedule(id);
    cz.classList.remove('hover');
  };
}

// ── HISTORY ──
async function loadHistoryWeeks(){
  const {data}=await sb.from('schedules').select('week_key').order('week_key',{ascending:false});
  if(!data)return;
  const weeks=[...new Set(data.map(r=>r.week_key))];
  const sel=document.getElementById('histWeekSel');
  sel.innerHTML=weeks.map(w=>`<option value="${w}">${fmtWeek(w)}</option>`).join('');
}

async function loadHistory(){
  const wk=document.getElementById('histWeekSel').value;
  if(!wk)return;
  const {data}=await sb.from('schedules').select('*').eq('week_key',wk).order('day_index').order('time');
  histData=data||[];
  renderHistGrid(histData,document.getElementById('histGrid'));
}

function renderHistGrid(data,container){
  const byDay={};
  for(let i=0;i<7;i++) byDay[i]=[];
  data.forEach(s=>byDay[s.day_index].push(s));
  container.innerHTML='';
  for(let d=0;d<7;d++){
    const items=byDay[d];
    if(items.length===0)continue;
    const row=document.createElement('div');
    row.className='day-row';
    const cardsHtml=items.map(s=>{
      const typeIcon=s.vehicle_type==='รถบรรทุก'?'🚛':s.vehicle_type==='รถยนต์'?'🚗':'🚐';
      return `<div class="tc ${s.cancelled?'cancelled':''}">
        <div class="tc-time">${typeIcon} ${s.time} ${s.cancelled?'<span style="color:var(--red);font-size:.7rem">ยกเลิก</span>':''}</div>
        <div class="tc-route">${s.origin} → ${s.destination}</div>
        ${s.eta?`<div class="tc-eta">🕐 คาดถึง ${s.eta}</div>`:''}
        ${s.vehicle_type?`<div class="tc-type">${s.vehicle_type}</div>`:''}
        ${s.note?`<div class="tc-note">📝 ${s.note}</div>`:''}
      </div>`;
    }).join('');
    row.innerHTML=`
      <div class="day-lbl" style="background:${DAY_COLORS[d]}">${DAY_NAMES[d]}<span class="cnt">${items.length} รอบ</span></div>
      <div class="cards-wrap">${cardsHtml}</div>`;
    container.appendChild(row);
  }
}

// ── EXPORT EXCEL ──
function exportToExcel(data,filename){
  if(!data||data.length===0){showToast('⚠️ ไม่มีข้อมูลให้ export','err');return;}
  const rows=data.map(s=>({
    'วัน':s.day_name||'',
    'เวลาออก':s.time||'',
    'คาดถึง (ETA)':s.eta||'',
    'ประเภทรถ':s.vehicle_type||'',
    'ต้นทาง':s.origin||'',
    'ปลายทาง':s.destination||'',
    'หมายเหตุ':s.note||'',
    'สถานะ':s.cancelled?'ยกเลิก':'ใช้งาน',
    'สร้างเมื่อ':s.created_at?new Date(s.created_at).toLocaleString('th-TH'):'',
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'รอบรถ');
  XLSX.writeFile(wb,filename+'.xlsx');
  showToast('📊 Export Excel สำเร็จ!');
}

function exportCurrentWeek(){
  exportToExcel(schedules,`TSI_รอบรถ_${getWeekKey()}`);
}

function exportHistory(){
  if(!histData||histData.length===0){
    showToast('⚠️ กด "ดูข้อมูล" ก่อน แล้วค่อย Export','err');return;
  }
  const wk=document.getElementById('histWeekSel').value;
  exportToExcel(histData,`TSI_ประวัติ_${wk}`);
}

// ── NOTIFICATION ──
function checkNotifications(){
  if(!myBranch)return;
  const now=new Date();
  const todayIdx=now.getDay()===0?6:now.getDay()-1;
  schedules.filter(s=>!s.cancelled&&s.destination===myBranch&&s.day_index===todayIdx&&s.eta).forEach(s=>{
    if(notified.has(s.id))return;
    const [h,m]=s.eta.split(':').map(Number);
    const eta=new Date();eta.setHours(h,m,0,0);
    const mins=(eta-now)/60000;
    if(mins>=13&&mins<=17){
      notified.add(s.id);
      localStorage.setItem('notified',JSON.stringify([...notified]));
      showToast(`🔔 รถกำลังจะถึง ${myBranch}! ${s.origin}→${s.destination} คาดถึง ${s.eta}`,'alert');
      addRoute(s.origin,s.destination);
    }
  });
}

// ── REALTIME ──
function subscribeRealtime(){
  sb.channel('sc').on('postgres_changes',{event:'INSERT',schema:'public',table:'schedules'},p=>{
    const s=p.new;
    showToast(`🚚 รอบรถใหม่! ${s.origin} → ${s.destination} ${s.time}`);
    addRoute(s.origin,s.destination);
    refreshData();
  }).subscribe();
}

// ── BRANCH ──
function openBranchModal(){document.getElementById('branchModal').classList.add('open')}
function setBranch(b){
  myBranch=b;localStorage.setItem('myBranch',b);
  document.getElementById('navBranch').textContent=`🏭 ${b}`;
  document.getElementById('branchModal').classList.remove('open');
  showToast(`✅ ตั้งสาขา ${b}`);
}

// ── TOAST ──
function showToast(msg,type='ok'){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast'+(type==='err'?' err':'');
  t.innerHTML=`<div class="toast-ttl">${type==='err'?'⚠️':type==='alert'?'🔔':'✅'}</div><div class="toast-bod">${msg}</div>`;
  wrap.appendChild(t);
  setTimeout(()=>t.remove(),5000);
}

// ── TABS ──
function showTab(t,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(tb=>tb.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  el.classList.add('active');
}

// ── UTILS ──
function getWeekKey(){
  const d=new Date();d.setHours(0,0,0,0);
  d.setDate(d.getDate()-((d.getDay()+6)%7));
  return d.toISOString().slice(0,10);
}
function fmtWeek(wk){
  const d=new Date(wk);
  return `จันทร์ ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
}

// ── INIT ──
window.onload=async()=>{
  initMap();
  updateLegend();
  if(!myBranch) openBranchModal();
  else document.getElementById('navBranch').textContent=`🏭 ${myBranch}`;
  document.getElementById('fDay').value=new Date().getDay()===0?6:new Date().getDay()-1;
  document.getElementById('fDest').value='CNS';
  await refreshData();
  subscribeRealtime();
  setInterval(checkNotifications,30000);
  setInterval(refreshData,30000);
  window.addEventListener('resize',()=>{
    const W=canvas.parentElement.clientWidth;
    canvas.width=W;canvas.height=Math.round(W*0.65);
  });
};
</script>
