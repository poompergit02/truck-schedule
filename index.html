<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🚚 TSI - ระบบรอบรถ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --p9:#1E0A45;--p7:#4C1D95;--p5:#7C3AED;--p4:#A78BFA;--p1:#EDE9FE;--p0:#F5F3FF;
  --gold:#F59E0B;--g4:#9CA3AF;--g7:#374151;--red:#DC2626;--green:#059669;
  --r:14px;--rs:8px;--sh:0 2px 12px rgba(91,33,182,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--p0);color:var(--g7);min-height:100vh}
nav{background:var(--p9);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4)}
.nav-logo{color:#fff;font-size:1.15rem;font-weight:700}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-branch{background:var(--p7);color:var(--p1);padding:5px 14px;border-radius:20px;font-size:.82rem;cursor:pointer;border:1px solid var(--p4);transition:.2s}
.nav-branch:hover{background:var(--p5)}
.btn-sm{background:transparent;border:1px solid var(--p4);color:var(--p1);padding:5px 12px;border-radius:20px;font-size:.8rem;cursor:pointer;font-family:'Sarabun',sans-serif;transition:.2s}
.btn-sm:hover{background:var(--p7)}
.btn-sm.danger{border-color:#EF4444;color:#FCA5A5}
.btn-sm.danger:hover{background:#7f1d1d}
.tab-bar{background:#fff;border-bottom:2px solid var(--p1);display:flex;padding:0 20px;gap:2px;overflow-x:auto}
.tab{padding:12px 18px;font-size:.9rem;font-weight:600;color:var(--g4);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.2s}
.tab.active{color:var(--p5);border-bottom-color:var(--p5)}
.page{display:none;padding:20px;max-width:960px;margin:0 auto}
.page.active{display:block}
.map-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
#mapCanvas{display:block;width:100%}
.form-card{background:#fff;border-radius:var(--r);padding:22px;box-shadow:var(--sh);margin-bottom:16px;border:1px solid var(--p1)}
.form-card h2{font-size:1rem;font-weight:700;color:var(--p9);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:.78rem;font-weight:600;color:var(--p7)}
.form-group select,.form-group input{padding:8px 10px;border:1.5px solid var(--p1);border-radius:var(--rs);font-size:.88rem;font-family:'Sarabun',sans-serif;color:var(--g7);background:var(--p0);outline:none;transition:.2s}
.form-group select:focus,.form-group input:focus{border-color:var(--p4);background:#fff}
.arrow-lbl{display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:1.3rem;color:var(--p4);font-weight:700}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--p5),var(--p7));color:#fff;border:none;border-radius:var(--rs);font-size:.95rem;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;transition:.2s;margin-top:4px}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.35)}
.week-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.week-hdr h2{font-size:1rem;font-weight:700;color:var(--p9)}
.btn-refresh{padding:7px 16px;background:var(--p5);color:#fff;border:none;border-radius:var(--rs);font-size:.85rem;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:600}
.crusher-bar{background:linear-gradient(90deg,#3B0764,#6B21A8);border-radius:var(--rs);padding:9px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.crusher-bar span{color:#DDD6FE;font-size:.82rem;flex:1}
.crusher-zone{min-width:80px;height:38px;background:#3B0764;border:2px dashed var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#FDE68A;transition:.2s;cursor:crosshair;gap:4px}
.crusher-zone.hover{background:#7F1D1D;border-color:#EF4444;transform:scale(1.06)}
.day-row{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--p1)}
.day-lbl{padding:8px 16px;font-weight:700;font-size:.85rem;display:flex;align-items:center;gap:8px;color:#fff}
.day-lbl .cnt{margin-left:auto;background:rgba(255,255,255,.22);padding:2px 10px;border-radius:12px;font-size:.72rem;font-weight:600}
.cards-wrap{padding:10px 12px;display:flex;flex-wrap:wrap;gap:8px;min-height:44px;align-items:flex-start}
.empty-msg{color:var(--g4);font-size:.82rem;padding:6px 4px;align-self:center}
.tc{background:var(--p0);border:1.5px solid var(--p1);border-radius:var(--rs);padding:8px 12px;min-width:160px;max-width:200px;position:relative;cursor:grab;transition:.2s;user-select:none}
.tc:hover{box-shadow:0 4px 16px rgba(124,58,237,.18);transform:translateY(-2px)}
.tc.cancelled{opacity:.4;filter:grayscale(1);cursor:default;transform:none}
.tc-time{font-size:.9rem;font-weight:700;color:var(--p9)}
.tc-route{font-size:.8rem;color:var(--p7);font-weight:600;margin:3px 0}
.tc-eta{font-size:.75rem;color:var(--green);font-weight:600}
.tc-note{font-size:.73rem;color:var(--g4);margin-top:2px}
.tc-type{font-size:.7rem;background:var(--p1);color:var(--p7);padding:2px 7px;border-radius:8px;display:inline-block;margin-top:3px}
.tc-cancel{position:absolute;top:5px;right:5px;background:var(--red);color:#fff;border:none;border-radius:50%;width:19px;height:19px;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.tc:hover .tc-cancel{opacity:1}
.hist-ctrl{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.hist-ctrl select{padding:8px 12px;border:1.5px solid var(--p1);border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.88rem;background:#fff;outline:none}
.btn-load{padding:8px 16px;background:var(--p5);color:#fff;border:none;border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.88rem;cursor:pointer;font-weight:600}
.btn-export{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.88rem;cursor:pointer;font-weight:600}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;max-width:310px}
.toast{background:var(--p9);color:#fff;border-radius:var(--r);padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:sIn .3s ease;border-left:4px solid var(--gold)}
.toast.err{border-left-color:#EF4444;background:#450A0A}
@keyframes sIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-bod{font-size:.83rem;line-height:1.4}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--r);padding:28px;width:360px;max-width:95vw;box-shadow:0 24px 64px rgba(0,0,0,.3)}
.modal h2{color:var(--p9);margin-bottom:6px;font-size:1.1rem;font-weight:700}
.modal p{color:var(--g4);font-size:.83rem;margin-bottom:16px}
.branch-btn{width:100%;padding:11px 14px;margin-bottom:7px;border-radius:var(--rs);border:2px solid var(--p1);background:var(--p0);color:var(--p9);font-family:'Sarabun',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;text-align:left;display:flex;align-items:center;gap:8px}
.branch-btn:hover{background:var(--p5);color:#fff;border-color:var(--p5)}
.pw-input{width:100%;padding:10px 12px;border:1.5px solid var(--p1);border-radius:var(--rs);font-size:.95rem;font-family:'Sarabun',sans-serif;margin-bottom:10px;outline:none}
.pw-input:focus{border-color:var(--p4)}
.btn-confirm{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer}
.update-lbl{font-size:.72rem;color:var(--g4)}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">🚚 TSI</div>
  <div class="nav-right">
    <button class="btn-sm danger" onclick="openResetModal()">🗑️ Reset</button>
    <button class="btn-sm" onclick="refreshData()">🔄</button>
    <div class="nav-branch" onclick="openBranchModal()" id="navBranch">🏭 เลือกสาขา</div>
  </div>
</nav>
<div class="tab-bar">
  <div class="tab active" onclick="showTab('live',this)">🗺️ แผนที่</div>
  <div class="tab" onclick="showTab('week',this)">📅 ตารางสัปดาห์</div>
  <div class="tab" onclick="showTab('history',this)">📂 ประวัติ</div>
</div>

<div class="page active" id="page-live">
  <div class="map-wrap"><canvas id="mapCanvas"></canvas></div>
  <div class="form-card">
    <h2>➕ เพิ่มรอบรถ</h2>
    <div class="form-grid">
      <div class="form-group"><label>📅 วัน</label>
        <select id="fDay"><option value="0">จันทร์</option><option value="1">อังคาร</option><option value="2">พุธ</option><option value="3">พฤหัส</option><option value="4">ศุกร์</option><option value="5">เสาร์</option><option value="6">อาทิตย์</option></select>
      </div>
      <div class="form-group"><label>⏰ เวลาออก</label><input type="time" id="fTime" value="08:00"/></div>
      <div class="form-group"><label>🚗 ประเภทรถ</label>
        <select id="fType"><option value="truck">🚛 รถบรรทุก</option><option value="car">🚗 รถยนต์</option><option value="van">🚐 อื่นๆ</option></select>
      </div>
      <div class="form-group"><label>🏭 ต้นทาง</label>
        <select id="fOrigin"><option>HQ</option><option>CNS</option><option>Sriracha</option><option>Lampoon</option><option>Phitsanulok</option></select>
      </div>
      <div class="arrow-lbl">→</div>
      <div class="form-group"><label>📍 ปลายทาง</label>
        <select id="fDest"><option>HQ</option><option>CNS</option><option>Sriracha</option><option>Lampoon</option><option>Phitsanulok</option></select>
      </div>
      <div class="form-group"><label>🕐 คาดถึง (ETA)</label><input type="time" id="fEta"/></div>
    </div>
    <div class="form-group" style="margin-bottom:12px"><label>📝 หมายเหตุ</label>
      <input type="text" id="fNote" placeholder="เช่น สินค้าด่วน..." maxlength="80"/>
    </div>
    <button class="btn-submit" onclick="submitSchedule()">🚚 ส่งรอบรถ</button>
  </div>
</div>

<div class="page" id="page-week">
  <div class="week-hdr">
    <div><h2>📅 ตารางสัปดาห์นี้</h2><div class="update-lbl" id="lastUpdate"></div></div>
    <div style="display:flex;gap:8px">
      <button class="btn-export" onclick="exportCurrentWeek()">📊 Excel</button>
      <button class="btn-refresh" onclick="refreshData()">🔄 Refresh</button>
    </div>
  </div>
  <div class="crusher-bar">
    <span>⚙️ ลากการ์ดรถมาวางที่เครื่องบด → ยกเลิกรอบ</span>
    <div class="crusher-zone" id="crusherZone">💥 บดทิ้ง</div>
  </div>
  <div id="weekGrid"></div>
</div>

<div class="page" id="page-history">
  <h2 style="color:var(--p9);margin-bottom:14px;font-size:1rem;font-weight:700">📂 ประวัติย้อนหลัง</h2>
  <div class="hist-ctrl">
    <select id="histWeekSel"></select>
    <button class="btn-load" onclick="loadHistory()">🔍 ดูข้อมูล</button>
    <button class="btn-export" onclick="exportHistory()">📊 Export Excel</button>
  </div>
  <div id="histGrid"></div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<div class="modal-bg" id="branchModal">
  <div class="modal">
    <h2>🏭 เลือกสาขาของคุณ</h2>
    <p>ระบบจะแจ้งเตือนเมื่อมีรถมาถึงสาขาของคุณ</p>
    <button class="branch-btn" onclick="setBranch('HQ')">🏢 HQ — ปทุมธานี (สำนักงานใหญ่)</button>
    <button class="branch-btn" onclick="setBranch('CNS')">🏬 CNS — ปทุมธานี (คลังสินค้า)</button>
    <button class="branch-btn" onclick="setBranch('Sriracha')">🏢 Sriracha — ชลบุรี</button>
    <button class="branch-btn" onclick="setBranch('Lampoon')">🏢 Lampoon — ลำพูน</button>
    <button class="branch-btn" onclick="setBranch('Phitsanulok')">🏢 Phitsanulok — พิษณุโลก</button>
  </div>
</div>

<div class="modal-bg" id="resetModal">
  <div class="modal">
    <h2>🗑️ Reset รอบรถทั้งหมด</h2>
    <p>ใส่รหัสผ่านเพื่อลบรอบรถทั้งหมดในสัปดาห์นี้</p>
    <input class="pw-input" type="password" id="resetPw" placeholder="รหัสผ่าน..." onkeydown="if(event.key==='Enter')confirmReset()"/>
    <button class="btn-confirm" onclick="confirmReset()">🗑️ ยืนยัน Reset</button>
    <button style="width:100%;padding:9px;margin-top:8px;background:none;border:1.5px solid #E5E7EB;border-radius:var(--rs);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:.9rem;color:var(--g7)" onclick="closeResetModal()">ยกเลิก</button>
  </div>
</div>

<script>
const SUPABASE_URL='YOUR_SUPABASE_URL';
const SUPABASE_KEY='YOUR_SUPABASE_ANON_KEY';
const RESET_PASSWORD='itpoom';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

const DAY_NAMES=['จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์','อาทิตย์'];
const DAY_COLORS=['#D97706','#DB2777','#059669','#EA580C','#2563EB','#7C3AED','#DC2626'];

// ── Canvas size ──
const CW=560, CH=480;

// ── สาขา: ตำแหน่งบน canvas ที่ทุกอันอยู่บนแผ่นดิน ──
const BRANCHES = {
  Lampoon:     { x:148, y: 72, color:'#CA8A04', label:'Lampoon',     sub:'ลำพูน',     type:'office' },
  Phitsanulok: { x:290, y:148, color:'#16A34A', label:'Phitsanulok', sub:'พิษณุโลก', type:'office' },
  CNS:         { x:175, y:278, color:'#2563EB', label:'CNS',         sub:'ปทุมธานี',  type:'warehouse' },
  HQ:          { x:270, y:292, color:'#7C3AED', label:'HQ',          sub:'สำนักงานใหญ่', type:'hq' },
  Sriracha:    { x:355, y:330, color:'#DC2626', label:'Sriracha',    sub:'ชลบุรี',    type:'office' },
};

// ── outline ไทย (ครอบทุกสาขา ทั้ง CNS ซ้าย และ Sriracha ขวา) ──
const TH = [
  // เริ่มภาคเหนือตะวันตก
  [118,18],[135,12],[155,8],[175,12],[195,8],[215,14],[235,10],[255,16],
  [272,12],[292,8],[310,14],[328,10],[345,20],[360,30],[368,44],[372,58],
  // ภาคเหนือตะวันออก-อีสาน
  [368,58],[374,75],[376,92],[374,110],[370,128],[364,146],[356,162],
  [346,176],[334,188],[322,198],[310,208],[298,216],[286,224],[276,232],
  [268,240],[262,250],[258,262],[256,272],[258,284],[262,296],[264,308],
  // ภาคกลาง-ใต้ตอนบน
  [264,308],[260,320],[255,332],[250,344],[245,356],[240,368],
  [238,380],[236,392],[234,404],[232,416],[230,428],[229,442],[228,458],
  [227,472],[226,480],
  // ปลายใต้ฝั่งตะวันตก
  [226,480],[220,476],[216,465],[214,452],[212,440],[210,428],[208,416],
  [206,404],[204,392],[202,380],[200,368],[198,356],[195,344],[192,332],
  [189,320],[186,308],[182,296],[178,284],[174,272],[170,262],[166,252],
  [162,242],[158,232],[154,222],[150,212],[146,202],[142,192],[138,182],
  [134,172],[130,162],[126,152],[122,142],[118,132],[114,122],[110,112],
  [107,102],[104,92],[102,82],[100,72],[99,62],[98,52],[99,42],[102,32],
  [108,24],[118,18]
];

// แม่น้ำ
const RIVERS = [
  [[238,60],[242,80],[244,100],[246,120],[248,140],[250,160],[252,180],
   [254,200],[256,220],[258,242],[260,264],[262,285],[264,308]],
];

// ป่า
const FORESTS=[
  {x:130,y:60,r:14},{x:155,y:90,r:12},{x:118,y:108,r:11},
  {x:175,y:52,r:10},{x:200,y:72,r:11},{x:340,y:40,r:10},
  {x:360,y:72,r:9},{x:318,y:90,r:10},{x:142,y:145,r:9},
  {x:122,y:175,r:8},{x:310,y:170,r:8},{x:340,y:145,r:7},
];

// ภูเขา (x1,y1, peak, x2,y2)
const MTNS=[
  [116,58],[128,44],[140,58],
  [138,90],[150,76],[162,90],
  [104,120],[116,106],[128,120],
  [340,30],[352,18],[364,30],
  [355,60],[365,48],[375,60],
  [320,110],[330,98],[340,110],
];

let myBranch=localStorage.getItem('myBranch')||null;
let schedules=[], notified=new Set(JSON.parse(localStorage.getItem('notified')||'[]'));
let routes=[], histData=[];
let canvas, ctx;

function initMap(){
  canvas=document.getElementById('mapCanvas');
  canvas.width=CW; canvas.height=CH;
  setResponsive();
  ctx=canvas.getContext('2d');
  requestAnimationFrame(loop);
  window.addEventListener('resize',setResponsive);
}
function setResponsive(){
  const maxW=Math.min(document.querySelector('.map-wrap').clientWidth,720);
  canvas.style.width=maxW+'px';
  canvas.style.height=Math.round(CH*(maxW/CW))+'px';
}

function loop(){ requestAnimationFrame(loop); if(!ctx)return; ctx.clearRect(0,0,CW,CH); drawBg(); drawRoutes(); drawBranches(); }

function drawBg(){
  // ทะเล
  const sg=ctx.createLinearGradient(0,0,CW,CH);
  sg.addColorStop(0,'#38BDF8'); sg.addColorStop(1,'#0369A1');
  ctx.fillStyle=sg; ctx.fillRect(0,0,CW,CH);

  // grid ทะเล
  ctx.save(); ctx.strokeStyle='rgba(255,255,255,.05)'; ctx.lineWidth=1;
  for(let x=0;x<CW;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=28){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
  ctx.restore();

  // แผ่นดิน shadow
  ctx.save(); ctx.shadowColor='rgba(0,0,0,.4)'; ctx.shadowBlur=16; ctx.shadowOffsetX=5; ctx.shadowOffsetY=5;
  ctx.beginPath(); TH.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)); ctx.closePath();
  const lg=ctx.createLinearGradient(100,8,380,480);
  lg.addColorStop(0,'#86EFAC'); lg.addColorStop(0.35,'#4ADE80');
  lg.addColorStop(0.65,'#22C55E'); lg.addColorStop(1,'#15803D');
  ctx.fillStyle=lg; ctx.fill(); ctx.restore();

  // ขอบแผ่นดิน
  ctx.beginPath(); TH.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)); ctx.closePath();
  ctx.strokeStyle='#14532D'; ctx.lineWidth=2; ctx.stroke();

  // ป่า
  FORESTS.forEach(f=>{
    ctx.save(); ctx.globalAlpha=.5;
    ctx.fillStyle='#14532D';
    ctx.beginPath();ctx.ellipse(f.x,f.y,f.r*1.4,f.r*.9,0,0,Math.PI*2);ctx.fill();
    for(let i=0;i<3;i++){
      const tx=f.x+(i-1)*f.r*.75,ty=f.y-2;
      ctx.fillStyle='#166534';
      ctx.beginPath();ctx.arc(tx,ty,f.r*.32,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });

  // ภูเขา
  for(let i=0;i<MTNS.length;i+=3){
    const [x1,y1,x2,y2,x3,y3]=[MTNS[i][0],MTNS[i][1],MTNS[i+1][0],MTNS[i+1][1],MTNS[i+2][0],MTNS[i+2][1]];
    ctx.save();
    ctx.fillStyle='#78716C'; ctx.strokeStyle='#A8A29E'; ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.45)';
    ctx.beginPath();ctx.moveTo(x2-3,y2+5);ctx.lineTo(x2,y2);ctx.lineTo(x2+3,y2+5);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  // แม่น้ำ
  RIVERS.forEach(r=>{
    ctx.save(); ctx.strokeStyle='#7DD3FC'; ctx.lineWidth=2; ctx.globalAlpha=.6;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); r.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)); ctx.stroke();
    ctx.restore();
  });

  // ป้ายทะเล
  ctx.save(); ctx.font='italic 11px Sarabun,sans-serif'; ctx.fillStyle='rgba(255,255,255,.7)'; ctx.textAlign='center';
  ctx.fillText('อ่าวไทย',455,300); ctx.fillText('อันดามัน',65,330); ctx.restore();
}

// ── icon วาดด้วย canvas ──
function drawIcon(x, y, type, color){
  ctx.save();
  ctx.translate(x, y);

  if(type==='hq'){
    // สำนักงานใหญ่ — ตึกใหญ่มีธง
    ctx.fillStyle=color; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    // ตึกหลัก
    ctx.beginPath();ctx.roundRect(-11,-20,22,20,2);ctx.fill();ctx.stroke();
    // หน้าต่าง
    ctx.fillStyle='#BAE6FD';
    [[-7,-17],[-1,-17],[5,-17],[-7,-11],[-1,-11],[5,-11],[-7,-5],[-1,-5],[5,-5]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.roundRect(wx,wy,4,4,1);ctx.fill();
    });
    // เสาธง
    ctx.fillStyle='#fff';
    ctx.fillRect(-1,-28,1.5,10);
    // ธง
    ctx.fillStyle='#EF4444';
    ctx.beginPath();ctx.moveTo(0,-28);ctx.lineTo(8,-25);ctx.lineTo(0,-22);ctx.closePath();ctx.fill();
    // ป้าย HQ
    ctx.fillStyle=color;ctx.strokeStyle='#fff';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(-8,0,16,6,2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 5px Sarabun,sans-serif';ctx.textAlign='center';
    ctx.fillText('HQ',0,5);

  }else if(type==='warehouse'){
    // คลังสินค้า — โกดังหลังคาจั่ว
    ctx.fillStyle=color; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    // ผนัง
    ctx.beginPath();ctx.rect(-14,-12,28,14);ctx.fill();ctx.stroke();
    // หลังคา
    ctx.fillStyle=darken(color,20);
    ctx.beginPath();ctx.moveTo(-16,-12);ctx.lineTo(0,-24);ctx.lineTo(16,-12);ctx.closePath();ctx.fill();ctx.stroke();
    // ประตูโกดัง
    ctx.fillStyle='#1E3A5F';
    ctx.beginPath();ctx.roundRect(-5,-10,10,12,1);ctx.fill();
    // แนวเส้นประตู
    ctx.strokeStyle='#4B8EC8';ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(0,2);ctx.stroke();
    // หน้าต่างข้าง
    ctx.fillStyle='#BAE6FD';
    [[-11,-10],[-11,-5],[7,-10],[7,-5]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.roundRect(wx,wy,3,3,1);ctx.fill();
    });

  }else{
    // office — อาคารทั่วไป
    ctx.fillStyle=color; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(-9,-18,18,18,2);ctx.fill();ctx.stroke();
    // หน้าต่าง
    ctx.fillStyle='#BAE6FD';
    [[-6,-15],[1,-15],[-6,-9],[1,-9],[-6,-3],[1,-3]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.roundRect(wx,wy,4,4,1);ctx.fill();
    });
    // ประตู
    ctx.fillStyle=darken(color,30);
    ctx.beginPath();ctx.roundRect(-3,0,6,2,1);ctx.fill();
  }
  ctx.restore();
}

function darken(hex, pct){
  let n=parseInt(hex.slice(1),16);
  const r=Math.max(0,((n>>16)&255)-pct);
  const g=Math.max(0,((n>>8)&255)-pct);
  const b=Math.max(0,(n&255)-pct);
  return `rgb(${r},${g},${b})`;
}

function drawBranches(){
  const now=Date.now();
  Object.entries(BRANCHES).forEach(([k,b])=>{
    const {x,y,color,label,sub,type}=b;
    const pulse=Math.sin(now/700+x)*.5+.5;

    // pulse ring
    ctx.save(); ctx.globalAlpha=pulse*.25;
    ctx.fillStyle=color; ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // วาด icon
    drawIcon(x, y-8, type, color);

    // เส้นต่อ label
    ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.setLineDash([3,2]);
    ctx.beginPath();ctx.moveTo(x,y-30);ctx.lineTo(x,y-42);ctx.stroke();
    ctx.setLineDash([]);

    // label box
    const fs=11;
    ctx.font=`bold ${fs}px Sarabun,sans-serif`;
    ctx.textAlign='center';
    const tw=Math.max(ctx.measureText(label).width, ctx.measureText(sub).width)+16;
    const bh=fs*2+10, bx=x-tw/2, by=y-42-bh;

    // shadow
    ctx.save(); ctx.shadowColor='rgba(0,0,0,.35)'; ctx.shadowBlur=8;
    ctx.fillStyle='rgba(10,3,25,.88)';
    ctx.beginPath();ctx.roundRect(bx,by,tw,bh,5);ctx.fill();
    ctx.restore();
    // ขอบสี
    ctx.strokeStyle=color; ctx.lineWidth=1.8;
    ctx.beginPath();ctx.roundRect(bx,by,tw,bh,5);ctx.stroke();
    // ชื่อ
    ctx.fillStyle='#fff'; ctx.font=`bold ${fs}px Sarabun,sans-serif`;
    ctx.fillText(label,x,by+fs+2);
    ctx.fillStyle=color; ctx.font=`${fs-1}px Sarabun,sans-serif`;
    ctx.fillText(sub,x,by+bh-4);
  });
}

// ── เส้นทาง offset ไป-กลับ ──
function offsetLine(fx,fy,tx,ty,off){
  const dx=tx-fx, dy=ty-fy, len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len*off, ny=dx/len*off;
  return [fx+nx,fy+ny,tx+nx,ty+ny];
}

function drawRoutes(){
  const now=Date.now();
  routes=routes.filter(r=>{
    const from=BRANCHES[r.from], to=BRANCHES[r.to]; if(!from||!to) return false;
    const elapsed=now-r.startTime;
    if(r.eta){const [hh,mm]=r.eta.split(':').map(Number);const ed=new Date();ed.setHours(hh,mm,0,0);if(now>ed.getTime())return false;}
    else if(elapsed>60000) return false;
    r.progress=Math.min(1,elapsed/9000);

    const keys=Object.keys(BRANCHES);
    const off=keys.indexOf(r.from)<keys.indexOf(r.to)?9:-9;
    const [fx,fy,tx,ty]=offsetLine(from.x,from.y-8,to.x,to.y-8,off);
    const angle=Math.atan2(ty-fy,tx-fx);

    ctx.save();
    ctx.setLineDash([8,5]); ctx.lineDashOffset=-(now/38)%26;
    ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);ctx.stroke();
    ctx.strokeStyle=r.color; ctx.lineWidth=3; ctx.globalAlpha=.92;
    ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);ctx.stroke();

    // ลูกศร
    const ax=fx+(tx-fx)*.82, ay=fy+(ty-fy)*.82;
    ctx.globalAlpha=1; ctx.fillStyle=r.color; ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(ax+Math.cos(angle)*11,ay+Math.sin(angle)*11);
    ctx.lineTo(ax+Math.cos(angle+2.5)*7,ay+Math.sin(angle+2.5)*7);
    ctx.lineTo(ax+Math.cos(angle-2.5)*7,ay+Math.sin(angle-2.5)*7);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // รถ
    drawVehicle(fx+(tx-fx)*r.progress, fy+(ty-fy)*r.progress, angle, r.color, r.vtype);
    return true;
  });
}

function drawVehicle(px,py,angle,color,type){
  ctx.save(); ctx.translate(px,py); ctx.rotate(angle);
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=5;
  if(type==='truck'){
    ctx.fillStyle=color; ctx.strokeStyle='#fff'; ctx.lineWidth=1.2;
    ctx.beginPath();ctx.roundRect(-18,-6,28,12,3);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(8,-8,14,16,3);ctx.fill();ctx.stroke();
    ctx.fillStyle='#BAE6FD'; ctx.beginPath();ctx.roundRect(10,-6,9,6,2);ctx.fill();
    ctx.fillStyle='#FFE87C'; ctx.beginPath();ctx.roundRect(20,-2,3,4,1);ctx.fill();
    ctx.fillStyle='#1E293B';
    [[-11,7],[-2,7],[10,7],[17,7]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.ellipse(wx,wy,3.8,3.8,0,0,Math.PI*2);ctx.fill();
    });
    ctx.save();ctx.globalAlpha=.3;ctx.fillStyle='#E5E7EB';
    ctx.beginPath();ctx.ellipse(22,-9,3,4.5,0,0,Math.PI*2);ctx.fill();ctx.restore();
  }else if(type==='car'){
    ctx.fillStyle=color; ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(-11,-4,20,8,3);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(-7,-8,13,6,3);ctx.fill();ctx.stroke();
    ctx.fillStyle='#BAE6FD'; ctx.beginPath();ctx.roundRect(-5,-7,10,4,2);ctx.fill();
    ctx.fillStyle='#FFE87C'; ctx.beginPath();ctx.roundRect(8,-1,2,3,1);ctx.fill();
    ctx.fillStyle='#1E293B';
    [[-6,5],[6,5]].forEach(([wx,wy])=>{ctx.beginPath();ctx.ellipse(wx,wy,3,3,0,0,Math.PI*2);ctx.fill();});
  }else{
    ctx.fillStyle=color; ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(-14,-5,25,11,3);ctx.fill();ctx.stroke();
    ctx.fillStyle='#BAE6FD';
    [[-9,-3],[-4,-3],[1,-3]].forEach(([wx,wy])=>{ctx.beginPath();ctx.roundRect(wx,wy,4,5,1);ctx.fill();});
    ctx.fillStyle='#FFE87C'; ctx.beginPath();ctx.roundRect(10,-1,2,3,1);ctx.fill();
    ctx.fillStyle='#1E293B';
    [[-8,6],[8,6]].forEach(([wx,wy])=>{ctx.beginPath();ctx.ellipse(wx,wy,3.5,3.5,0,0,Math.PI*2);ctx.fill();});
  }
  ctx.restore();
}

function addRoute(from,to,eta,vtype){
  const palette=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#CC5DE8','#FF8787','#74C0FC'];
  routes.push({from,to,color:palette[Math.floor(Math.random()*palette.length)],
    vtype:vtype||'van',startTime:Date.now(),progress:0,eta:eta||null});
}
function rebuildRoutes(){
  routes=[];
  const now=new Date(),ti=now.getDay()===0?6:now.getDay()-1;
  schedules.filter(s=>!s.cancelled&&s.day_index===ti).forEach(s=>{
    if(s.eta){const [h,m]=s.eta.split(':').map(Number);const ed=new Date();ed.setHours(h,m,0,0);if(ed>now)addRoute(s.origin,s.destination,s.eta,s.vehicle_type||'van');}
    else addRoute(s.origin,s.destination,null,s.vehicle_type||'van');
  });
}

async function refreshData(){
  const {data,error}=await sb.from('schedules').select('*').eq('week_key',getWeekKey()).order('day_index').order('time');
  if(error){showToast('❌ โหลดข้อมูลไม่สำเร็จ','err');return;}
  schedules=data||[]; renderWeek(schedules); rebuildRoutes();
  document.getElementById('lastUpdate').textContent=`อัปเดต ${new Date().toLocaleTimeString('th-TH')}`;
  await loadHistoryWeeks(); checkNotifications();
}
async function submitSchedule(){
  const day=parseInt(document.getElementById('fDay').value);
  const time=document.getElementById('fTime').value, type=document.getElementById('fType').value;
  const origin=document.getElementById('fOrigin').value, dest=document.getElementById('fDest').value;
  const eta=document.getElementById('fEta').value, note=document.getElementById('fNote').value.trim();
  if(origin===dest){showToast('⚠️ ต้นทางและปลายทางต้องไม่เหมือนกัน','err');return;}
  const {error}=await sb.from('schedules').insert({week_key:getWeekKey(),day_index:day,day_name:DAY_NAMES[day],time,vehicle_type:type,origin,destination:dest,eta:eta||null,note:note||null,cancelled:false,created_at:new Date().toISOString()});
  if(error){showToast('❌ บันทึกไม่สำเร็จ: '+error.message,'err');return;}
  addRoute(origin,dest,eta||null,type);
  showToast(`✅ เพิ่มรอบรถ ${origin} → ${dest}`);
  document.getElementById('fNote').value=''; await refreshData();
}
async function cancelSchedule(id){
  if(!confirm('ยืนยันยกเลิกรอบรถนี้?'))return;
  await sb.from('schedules').update({cancelled:true}).eq('id',id);
  showToast('❌ ยกเลิกรอบรถแล้ว'); await refreshData();
}
function openResetModal(){document.getElementById('resetModal').classList.add('open');document.getElementById('resetPw').value='';setTimeout(()=>document.getElementById('resetPw').focus(),100);}
function closeResetModal(){document.getElementById('resetModal').classList.remove('open');}
async function confirmReset(){
  if(document.getElementById('resetPw').value!==RESET_PASSWORD){showToast('❌ รหัสผ่านไม่ถูกต้อง','err');return;}
  const {error}=await sb.from('schedules').delete().eq('week_key',getWeekKey());
  if(error){showToast('❌ Reset ไม่สำเร็จ','err');return;}
  closeResetModal(); routes=[]; showToast('🗑️ Reset สำเร็จ'); await refreshData();
}
function typeLabel(t){return t==='truck'?'🚛 รถบรรทุก':t==='car'?'🚗 รถยนต์':'🚐 อื่นๆ';}
function renderWeek(data){
  const grid=document.getElementById('weekGrid');
  const byDay={};for(let i=0;i<7;i++) byDay[i]=[];
  data.filter(s=>!s.cancelled).forEach(s=>byDay[s.day_index].push(s));
  grid.innerHTML='';
  for(let d=0;d<7;d++){
    const items=byDay[d].sort((a,b)=>a.time.localeCompare(b.time));
    const row=document.createElement('div');row.className='day-row';
    row.innerHTML=`<div class="day-lbl" style="background:${DAY_COLORS[d]}">${DAY_NAMES[d]}<span class="cnt">${items.length} รอบ</span></div><div class="cards-wrap" id="cw-${d}">${!items.length?'<span class="empty-msg">— ไม่มีรอบรถ —</span>':''}</div>`;
    grid.appendChild(row);
    items.forEach(s=>{
      const c=document.createElement('div');c.className='tc';c.draggable=true;
      c.innerHTML=`<button class="tc-cancel" onclick="cancelSchedule('${s.id}')">✕</button><div class="tc-time">${s.time}</div><div class="tc-route">${s.origin} → ${s.destination}</div>${s.eta?`<div class="tc-eta">🕐 คาดถึง ${s.eta}</div>`:''}${s.vehicle_type?`<div class="tc-type">${typeLabel(s.vehicle_type)}</div>`:''}${s.note?`<div class="tc-note">📝 ${s.note}</div>`:''}`;
      c.addEventListener('dragstart',e=>{e.dataTransfer.setData('sid',s.id);document.getElementById('crusherZone').classList.add('hover');});
      c.addEventListener('dragend',()=>document.getElementById('crusherZone').classList.remove('hover'));
      document.getElementById('cw-'+d).appendChild(c);
    });
  }
  const cz=document.getElementById('crusherZone');
  cz.ondragover=e=>e.preventDefault();
  cz.ondrop=e=>{e.preventDefault();const id=e.dataTransfer.getData('sid');if(id)cancelSchedule(id);cz.classList.remove('hover');};
}
async function loadHistoryWeeks(){
  const {data}=await sb.from('schedules').select('week_key').order('week_key',{ascending:false});
  if(!data)return;
  const weeks=[...new Set(data.map(r=>r.week_key))];
  document.getElementById('histWeekSel').innerHTML=weeks.map(w=>`<option value="${w}">${fmtWeek(w)}</option>`).join('');
}
async function loadHistory(){
  const wk=document.getElementById('histWeekSel').value;if(!wk)return;
  const {data}=await sb.from('schedules').select('*').eq('week_key',wk).order('day_index').order('time');
  histData=data||[];
  const container=document.getElementById('histGrid');container.innerHTML='';
  const byDay={};for(let i=0;i<7;i++) byDay[i]=[];
  histData.forEach(s=>byDay[s.day_index].push(s));
  for(let d=0;d<7;d++){
    const items=byDay[d];if(!items.length)continue;
    const row=document.createElement('div');row.className='day-row';
    const html=items.map(s=>`<div class="tc ${s.cancelled?'cancelled':''}"><div class="tc-time">${s.time}${s.cancelled?' <span style="color:var(--red);font-size:.7rem">ยกเลิก</span>':''}</div><div class="tc-route">${s.origin} → ${s.destination}</div>${s.eta?`<div class="tc-eta">🕐 ${s.eta}</div>`:''}${s.vehicle_type?`<div class="tc-type">${typeLabel(s.vehicle_type)}</div>`:''}${s.note?`<div class="tc-note">📝 ${s.note}</div>`:''}</div>`).join('');
    row.innerHTML=`<div class="day-lbl" style="background:${DAY_COLORS[d]}">${DAY_NAMES[d]}<span class="cnt">${items.length}</span></div><div class="cards-wrap">${html}</div>`;
    container.appendChild(row);
  }
}
function exportToExcel(data,filename){
  if(!data||!data.length){showToast('⚠️ ไม่มีข้อมูล','err');return;}
  const rows=data.map(s=>({'วัน':s.day_name||'','เวลาออก':s.time||'','คาดถึง':s.eta||'','ประเภทรถ':typeLabel(s.vehicle_type||'van'),'ต้นทาง':s.origin||'','ปลายทาง':s.destination||'','หมายเหตุ':s.note||'','สถานะ':s.cancelled?'ยกเลิก':'ใช้งาน','วันที่':s.created_at?new Date(s.created_at).toLocaleString('th-TH'):''}));
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'รอบรถ');
  XLSX.writeFile(wb,filename+'.xlsx');showToast('📊 Export สำเร็จ!');
}
function exportCurrentWeek(){exportToExcel(schedules,`TSI_รอบรถ_${getWeekKey()}`);}
function exportHistory(){if(!histData.length){showToast('⚠️ กด "ดูข้อมูล" ก่อน','err');return;}exportToExcel(histData,`TSI_ประวัติ_${document.getElementById('histWeekSel').value}`);}
function checkNotifications(){
  if(!myBranch)return;
  const now=new Date(),ti=now.getDay()===0?6:now.getDay()-1;
  schedules.filter(s=>!s.cancelled&&s.destination===myBranch&&s.day_index===ti&&s.eta).forEach(s=>{
    if(notified.has(s.id))return;
    const [h,m]=s.eta.split(':').map(Number);const eta=new Date();eta.setHours(h,m,0,0);
    const mins=(eta-now)/60000;
    if(mins>=13&&mins<=17){notified.add(s.id);localStorage.setItem('notified',JSON.stringify([...notified]));showToast(`🔔 รถกำลังจะถึง ${myBranch}! ${s.origin}→${s.destination} คาดถึง ${s.eta}`);}
  });
}
function subscribeRealtime(){sb.channel('sc').on('postgres_changes',{event:'*',schema:'public',table:'schedules'},()=>refreshData()).subscribe();}
function openBranchModal(){document.getElementById('branchModal').classList.add('open');}
function setBranch(b){myBranch=b;localStorage.setItem('myBranch',b);document.getElementById('navBranch').textContent=`🏭 ${b}`;document.getElementById('branchModal').classList.remove('open');showToast(`✅ ตั้งสาขา ${b}`);}
function showToast(msg,type='ok'){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className='toast'+(type==='err'?' err':'');
  t.innerHTML=`<div class="toast-bod">${msg}</div>`;wrap.appendChild(t);setTimeout(()=>t.remove(),5000);
}
function showTab(t,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(tb=>tb.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');el.classList.add('active');
}
function getWeekKey(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));return d.toISOString().slice(0,10);}
function fmtWeek(wk){const d=new Date(wk);return `จันทร์ ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;}
window.onload=async()=>{
  initMap();
  if(!myBranch)openBranchModal();
  else document.getElementById('navBranch').textContent=`🏭 ${myBranch}`;
  document.getElementById('fDay').value=new Date().getDay()===0?6:new Date().getDay()-1;
  document.getElementById('fDest').value='CNS';
  await refreshData(); subscribeRealtime();
  setInterval(checkNotifications,30000); setInterval(refreshData,30000);
};
</script>
